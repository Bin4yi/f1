
# AeroMind 2026 — Production Nginx config
# BACKEND_URL is substituted at container start via envsubst
# WebSocket upgrades are proxied for /aria and /aria/voice (Gemini Live)

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Increase buffer sizes for WebSocket + large audio payloads
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # SSL settings for HTTPS upstream (Cloud Run backend)
    proxy_ssl_server_name       on;
    proxy_ssl_protocols         TLSv1.2 TLSv1.3;

    # REST API → backend Cloud Run
    location /api/ {
        proxy_pass              ${BACKEND_URL};
        proxy_http_version      1.1;
        proxy_set_header        Host $proxy_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_read_timeout      120s;
    }

    # ARIA commentary WebSocket feed
    location /aria {
        proxy_pass              ${BACKEND_URL};
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host $proxy_host;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # Gemini Live bidirectional voice WebSocket
    location /aria/voice {
        proxy_pass              ${BACKEND_URL};
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host $proxy_host;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # General WebSocket endpoint
    location /ws {
        proxy_pass              ${BACKEND_URL};
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host $proxy_host;
        proxy_read_timeout      3600s;
    }

    # Frontend SPA — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
